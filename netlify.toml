toml
     [build]
       command = "npm run build"
       publish = "dist"

     [[redirects]]
       from = "/api/"
       to = "/.netlify/functions/proxy/:splat"
       status = 200

     [[redirects]]
       from = "/"
       to = "/index.html"
       status = 200

     [[headers]]
       for = "/assets/"
       [headers.values]
         cache-control = "public, max-age=7776000"

     [[headers]]
       for = "/static/*"
       [headers.values]
         cache-control = "public, max-age=7776000"
